<div class="min-h-screen bg-gray-100 flex items-center justify-center p-8">
  <div class="w-full max-w-3xl space-y-12">
    
    
    <div>
      <h1 class="text-3xl font-bold mb-8 border-b-4 border-black inline-block pb-2">
        Dados pessoais
      </h1>

      <div class="space-y-5">
        <div>
          <label class="text-sm text-gray-600 mb-2 block">CPF</label>
          <input 
            type="text" 
            [value]="cliente?.cpf" 
            readonly
            class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 shadow-sm cursor-not-allowed outline-none focus:outline-none focus:ring-0">
        </div>

        <div>
          <label class="text-sm text-gray-600 mb-2 block">Nome completo</label>
          <input 
            type="text" 
            [value]="cliente?.nome" 
            readonly
            class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 shadow-sm cursor-not-allowed outline-none focus:outline-none focus:ring-0">
        </div>

        <div>
          <label class="text-sm text-gray-600 mb-2 block">E-mail</label>
          <input 
            type="text" 
            [value]="cliente?.email" 
            readonly
            class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 shadow-sm cursor-not-allowed outline-none focus:outline-none focus:ring-0">
        </div>

        <div>
          <label class="text-sm text-gray-600 mb-2 block">Telefone</label>
          <input 
            type="text" 
            [value]="'('+ cliente?.telefone?.ddd +') ' + cliente?.telefone?.numero" 
            readonly
            class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 shadow-sm cursor-not-allowed outline-none focus:outline-none focus:ring-0">
        </div>

        <div>
          <label class="text-sm text-gray-600 mb-2 block">Data de nascimento</label>
          <input 
            type="text" 
            [value]="cliente?.dataNascimento | date:'dd/MM/yyyy'" 
            readonly
            class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 shadow-sm cursor-not-allowed outline-none focus:outline-none focus:ring-0">
        </div>
      </div>
    </div>

    
    <div>
      <h2 class="text-2xl font-bold mb-8">Endereço</h2>

      <div class="space-y-5">
       
        <div>
          <label class="text-sm text-gray-600 mb-2 block">CEP</label>
          <input 
            type="text" 
            placeholder="" 
            class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 border border-gray-200 outline-none focus:outline-none focus:ring-0 focus:border-gray-300">
        </div>

      
        <div>
          <label class="text-sm text-gray-600 mb-2 block">Endereço</label>
          <input 
            type="text" 
            placeholder="" 
            class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 border border-gray-200 outline-none focus:outline-none focus:ring-0 focus:border-gray-300">
        </div>

        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm text-gray-600 mb-2 block">Número</label>
            <input 
              type="text" 
              placeholder="" 
              class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 border border-gray-200 outline-none focus:outline-none focus:ring-0 focus:border-gray-300">
          </div>

          <div>
            <label class="text-sm text-gray-600 mb-2 block">Complemento</label>
            <input 
              type="text" 
              placeholder="" 
              class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 border border-gray-200 outline-none focus:outline-none focus:ring-0 focus:border-gray-300">
          </div>
        </div>

       
        <div>
          <label class="text-sm text-gray-600 mb-2 block">Bairro</label>
          <input 
            type="text" 
            placeholder="" 
            class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 border border-gray-200 outline-none focus:outline-none focus:ring-0 focus:border-gray-300">
        </div>

        
        <div>
          <label class="text-sm text-gray-600 mb-2 block">Estado</label>
          <select class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 border border-gray-200 outline-none focus:outline-none focus:ring-0 focus:border-gray-300 appearance-none cursor-pointer">
            <option value="">Selecione</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
          </select>
        </div>

        
        <div>
          <label class="text-sm text-gray-600 mb-2 block">Cidade</label>
          <select class="w-full bg-white px-4 py-4 rounded-lg text-gray-900 border border-gray-200 outline-none focus:outline-none focus:ring-0 focus:border-gray-300 appearance-none cursor-pointer">
            <option value="">Selecione</option>
          </select>
        </div>

        
        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-lg transition-colors mt-6">
          Salvar alterações
        </button>
      </div>
    </div>

  </div>
</div>
