<div class="background min-h-screen flex items-center justify-end pr-20">
  <div></div>
  <div class="w-full max-w-md">
    <form (ngSubmit)="loggedIn()" class="p-8 backdrop-blur-md bg-white/10 rounded-2xl shadow-lg border border-white/20">
      <div class="flex items-center gap-3 mb-6">
        <a routerLink="" class="text-black">
          <img src="https://dev.blackticket.com.br/svg/chevron-left-bulma.svg" alt="Logo" class="h-10 w-10">
        </a>
        <h2 class="text-3xl font-bold text-black">Entrar</h2>
      </div>
      
      <div class="text-left mb-8">
        <span class="text-black">
          Não possui conta? 
          <strong>
            <a class="text-blue-600 hover:text-blue-800 font-semibold">Cadastre-se</a>
          </strong>
        </span>
      </div>
      
      <div class="space-y-4">
        <input [(ngModel)]="credentials.email" name="email" type="email" placeholder="E-mail" class="w-full px-4 py-3 bg-black/30 backdrop-blur-sm border border-white/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-white/70" required>
        
        <input [(ngModel)]="credentials.senha" name="senha" type="password" placeholder="Senha" class="w-full px-4 py-3 bg-black/30 backdrop-blur-sm border border-white/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-white/70" required>
        
        <div class="text-right">
          <a class="text-sm text-blue-400 hover:text-blue-300">Esqueceu a sua senha?</a>
        </div>
        
        <button type="submit" class="block w-full py-3 px-4 bg-blue-600/90 hover:bg-blue-700 backdrop-blur-sm text-white font-semibold text-center rounded-lg transition duration-200">Fazer Login</button>
      </div>
      
      <div class="mt-6 text-left">
        <span class="text-sm text-gray-300">
          Ao entrar você concorda com nossos termos e políticas de privacidade
        </span>
      </div>
    </form>
    @if(showError){
      <div class="fixed bottom-5 right-5 bg-red-500 text-white px-6 py-4 rounded-lg shadow-lg flex items-center gap-3">

      <span>{{errorMessage}}</span>
      </div>
    }
  </div>
</div>
